version: 0.1.0
experiment_id: learned_state_bc_v0_1
policy_id: learned_state_bc_v0_1
episodes: configs/episodes/dev_episodes.yaml
scripted_policy: configs/policies/scripted_baseline.yaml
sunshield_survey_config: configs/experiments/sunshield_survey.yaml
output_dir: runs/learned_baseline
training:
  seed: 1505
  model_type: nearest_neighbor_state_bc
  epochs: 4
  source_policy: scripted_baseline
  feature_schema: state_features_v0_1
  observation_space: state_only
  image_observations_enabled: false
  multi_seed_sweep: false
  train_tasks:
    - approach_hold_standoff
    - sunshield_survey
evaluation:
  fixed_dev_episode_ids:
    - dev_approach_0001
    - dev_sunshield_0001
  compare_to_policy: scripted_baseline
  metrics_are_final: true
compute:
  execution_plane: local_control_plane
  gpu_required: false
  gpu_hours_budget: 0.0
  vast_training_allowed_after_local_gate: true
guardrails:
  reward_is_not_final_metric: true
  failed_runs_reported: true
  no_multi_seed_sweep_until_one_seed_reproducible: true
  no_image_policy_for_week5: true
  no_safety_or_coverage_region_changes: true
  metrics_table_generated_by_script: true
  no_gpu_result_without_synced_logs: true
