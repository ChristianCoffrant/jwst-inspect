version: 0.1.0
reference_board_id: jwst_visual_reference_board_v2
purpose: Ground visual fidelity in official mission media before rendering new benchmark visuals.
guardrails:
  real_closeup_in_space_photo_claim_allowed: false
  references_used_for_training_or_tuning: false
  source_provenance_required: true
  generated_or_postprocessed_media_must_be_labeled: true
sources:
  - source_id: nasa_webb_launch_final_view
    organization: NASA
    media_type: official_mission_page
    page_url: https://science.nasa.gov/mission/webb/launch/
    intended_use:
      - real_in_space_spacecraft_evidence
      - solar_array_deployment_context
      - silhouette_reference
    notes: Actual post-separation/final-view mission media is the best real in-space evidence, but it is low-detail compared with CGI references.
  - source_id: esa_webb_separation_video
    organization: ESA
    media_type: official_video_page
    page_url: https://www.esa.int/ESA_Multimedia/Videos/2021/12/Webb_separation_from_Ariane_5
    intended_use:
      - real_in_space_spacecraft_evidence
      - spacecraft_scale
      - deployment_geometry
    notes: Official Ariane 5 upper-stage view of Webb separation.
  - source_id: esa_hubble_webb_separation_image
    organization: ESA/Hubble
    media_type: official_image_page
    page_url: https://esahubble.org/images/FHdGeSgX0AoOwbm/
    intended_use:
      - real_in_space_spacecraft_evidence
      - separation_silhouette
      - spacecraft_scale
    notes: Official ESA/Hubble image record for Webb separated from Ariane 5 and flying on its own.
  - source_id: nasa_svs_deployment_sequence
    organization: NASA Scientific Visualization Studio
    media_type: official_animation_page
    page_url: https://svs.gsfc.nasa.gov/20339/
    intended_use:
      - deployment_geometry
      - camera_composition
      - sunshield_shape
    notes: CGI animation, not real camera footage; use as visual target, not physical ground truth.
  - source_id: nasa_svs_l2_visualization
    organization: NASA Scientific Visualization Studio
    media_type: official_visualization_page
    page_url: https://svs.gsfc.nasa.gov/4991/
    intended_use:
      - l2_space_context
      - starfield_environment
      - mission_context
    notes: Visualization of JWST at L2; useful for background and context.
  - source_id: nasa_jwst_3d_resource
    organization: NASA
    media_type: official_3d_asset_page
    page_url: https://science.nasa.gov/3d-resources/james-webb-space-telescope-b/
    local_asset: assets/official_nasa/James Webb Space Telescope (B).glb
    intended_use:
      - geometry
      - silhouette
      - component_layout
    notes: Official model used as the v2 visual/geometry foundation.
  - source_id: nasa_cleanroom_gold_mirror
    organization: NASA
    media_type: official_photo_page
    page_url: https://www.nasa.gov/universe/james-webb-space-telescopes-golden-mirror-unveiled/
    local_assets:
      - validation/reference_images/spacecraft/nasa_jwst_cleanroom_sunshield_primary_mirror_2016_jwst1.jpg
      - validation/reference_images/spacecraft/nasa_jwst_cleanroom_primary_mirror_close_2016_jwst2.jpg
    intended_use:
      - mirror_material
      - sunshield_material
      - cleanroom_detail_reference
    notes: Earth/cleanroom photos are not in-space references but are high-value material references.
