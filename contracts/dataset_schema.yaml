version: 0.2.0
status: frozen_week6_dataset_contract_0_2
dataset:
  name: jwst-inspect-sample
  version: 0.2.0
  owner: team2_synthetic_data_perception
  description: metadata-first synthetic inspection dataset contract for JWST-Inspect beta data and perception checks
  split_policy:
    train: rasterized_randomized
    validation: rasterized_holdout
    dev_test: rasterized_and_path_traced_dev
    final_test: held_out_path_traced
splits:
  train:
    description: rasterized training frames generated from non-held-out seeds
    renderer_modes_allowed:
      - rasterized
    tuning_allowed: true
  validation:
    description: rasterized holdout frames for development-time perception checks
    renderer_modes_allowed:
      - rasterized
    tuning_allowed: true
  dev_test:
    description: paired rasterized/path-traced development checks before final freeze
    renderer_modes_allowed:
      - rasterized
      - path_traced
    tuning_allowed: true
  final_test:
    description: held-out path-traced evaluation frames, not populated in Week 1
    renderer_modes_allowed:
      - path_traced
    tuning_allowed: false
renderer_modes:
  - rasterized
  - path_traced
outputs:
  rgb: images/{split}/{frame_id}.png
  depth: depth/{split}/{frame_id}.json
  semantic_mask: masks/semantic/{split}/{frame_id}.png
  instance_mask: masks/instance/{split}/{frame_id}.png
  metadata: metadata/{split}/{frame_id}.json
  manifest: dataset_manifest.json
media_policy:
  week1_sample_media_required: false
  week2_sample_media_required: true
  week3_episode_sample_required: true
  week4_randomized_pilot_required: true
  week5_anomaly_pilot_required: true
  week6_beta_dataset_required: true
  large_generated_outputs_in_git: prohibited
  missing_media_status: metadata_only_placeholder
  placeholder_media_status: tiny_placeholder_media
  generated_media_status: rasterized_synthetic_pilot
  anomaly_media_status: rasterized_anomaly_pilot
  beta_rasterized_media_status: rasterized_beta_synthetic
  beta_path_traced_media_status: path_traced_vast_synced
  beta_path_traced_pending_media_status: path_traced_vast_required
  placeholder_media_purpose: schema_validation_only_not_replicator_output
  placeholder_formats:
    rgb: png_rgb_8bit
    depth: json_depth_grid_meters
    semantic_mask: png_grayscale_label_ids
    instance_mask: png_grayscale_instance_ids
  sample_frame_count:
    min: 10
    max: 50
  week3_episode_frame_count: 100
  week4_randomized_pilot_frame_count: 600
  week4_randomized_train_frame_count: 500
  week4_clean_validation_frame_count: 100
  week5_anomaly_pilot_frame_count: 720
  week5_anomaly_train_frame_count: 480
  week5_anomaly_validation_frame_count: 120
  week5_anomaly_dev_test_frame_count: 120
  week6_beta_frame_count: 720
  week6_beta_train_frame_count: 480
  week6_beta_validation_frame_count: 120
  week6_beta_dev_test_frame_count: 120
  week6_beta_dev_test_rasterized_frame_count: 60
  week6_beta_dev_test_path_traced_frame_count: 60
  max_corrupt_or_blank_frame_fraction: 0.05
metadata_fields:
  - frame_id
  - split
  - seed
  - episode_id
  - frame_index
  - generation_mode
  - policy_id
  - task_id
  - renderer_mode
  - sampler_mode
  - target_region
  - camera_intrinsics
  - camera_extrinsics
  - target_pose
  - inspector_pose
  - label_map
  - lighting_condition
  - material_variant
  - anomaly_type
  - anomaly_prim
  - depth_noise_model
  - exposure_setting
  - outputs
  - media_status
  - randomization_config_id
  - randomization_config_version
  - randomization_profile
  - randomization_factors
  - anomaly_catalog_version
  - anomaly_instance_id
  - anomaly_is_present
  - stress_condition_id
  - counterpart_frame_id
  - scene_tag
  - dataset_tag
  - render_config_id
  - renderer_pair_id
  - gpu_run_id
  - artifact_sync_status
metadata_schema:
  frame_id:
    type: string
    required: true
    unique: true
  split:
    type: enum
    values:
      - train
      - validation
      - dev_test
      - final_test
  seed:
    type: integer
    required: true
  episode_id:
    type: string
    required: true
    split_leakage_guardrail: no_cross_split_reuse_unless_paired_renderer_comparison
  frame_index:
    type: integer
    required_for_generation_mode: episode_rollout
    rollout_join_key: true
  generation_mode:
    type: enum
    values:
      - static_sample
      - episode_rollout
      - static_randomized
      - static_anomaly_pilot
      - beta_scene_dataset
    required_for_week3_episode_dataset: true
  policy_id:
    type: string
    required_for_generation_mode: episode_rollout
    source: configs/policies/
  task_id:
    type: string
    required_for_generation_mode: episode_rollout
    source: configs/episodes/
  renderer_mode:
    type: enum
    values:
      - rasterized
      - path_traced
  sampler_mode:
    type: enum
    values:
      - uniform_standoff
      - task_focused
      - failure_focused
  target_region:
    type: enum
    source: contracts/scene_contract.yaml:task_regions
  camera_intrinsics:
    required_keys:
      - width_px
      - height_px
      - fx_px
      - fy_px
      - cx_px
      - cy_px
      - clipping_range_m
      - placeholder_width_px
      - placeholder_height_px
  camera_extrinsics:
    frame: world
    required_keys:
      - position_m
      - quaternion_xyzw
      - look_at_m
  target_pose:
    frame: world
    required_keys:
      - position_m
      - quaternion_xyzw
  inspector_pose:
    frame: world
    required_keys:
      - position_m
      - quaternion_xyzw
  label_map:
    source: contracts/scene_contract.yaml:labels
    unknown_label_ids: prohibited
  anomaly_type:
    source: replicator/anomaly_catalog.yaml:anomalies.anomaly_id
  anomaly_prim:
    nullable_when_anomaly_type: none
  outputs:
    required_keys:
      - rgb
      - depth
      - semantic_mask
      - instance_mask
      - metadata
  randomization_config_id:
    type: string
    required_for_generation_mode: static_randomized
    source: replicator/randomization.yaml
  randomization_config_version:
    type: string
    required_for_generation_mode: static_randomized
  randomization_profile:
    type: enum
    values:
      - train_randomized_v0_1
      - clean_validation_v0_1
      - anomaly_train_v0_1
      - anomaly_eval_v0_1
      - beta_train_v0_2
      - beta_validation_v0_2
      - beta_dev_renderer_pair_v0_2
    required_for_generation_mode: static_randomized
  randomization_factors:
    type: mapping
    required_for_generation_mode: static_randomized
    required_keys:
      - camera
      - lighting
      - exposure
      - background
      - material
  anomaly_catalog_version:
    type: string
    required_for_generation_mode: static_anomaly_pilot
    source: replicator/anomaly_catalog.yaml
  anomaly_instance_id:
    type: string_or_null
    required_for_generation_mode: static_anomaly_pilot
  anomaly_is_present:
    type: boolean
    required_for_generation_mode: static_anomaly_pilot
  stress_condition_id:
    type: string
    required_for_generation_mode: static_anomaly_pilot
  counterpart_frame_id:
    type: string_or_null
    required_for_generation_mode: static_anomaly_pilot
  scene_tag:
    type: string
    required_for_generation_mode: beta_scene_dataset
    source: contracts/scene_contract.yaml:scene_beta.scene_tag
  dataset_tag:
    type: string
    required_for_generation_mode: beta_scene_dataset
  render_config_id:
    type: string
    required_for_generation_mode: beta_scene_dataset
    source: configs/renderers/week6_beta_validation.yaml
  renderer_pair_id:
    type: string_or_null
    required_for_split: dev_test
  gpu_run_id:
    type: string_or_null
    required_when_renderer_mode: path_traced
    source: compute/gpu_run_registry.csv:run_id
  artifact_sync_status:
    type: enum
    values:
      - synced
      - not_synced
      - not_applicable
    required_for_generation_mode: beta_scene_dataset
camera_sampling:
  modes:
    uniform_standoff:
      description: deterministic views around the declared standoff shell
      week1_status: implemented_as_metadata_sampler
    task_focused:
      description: deterministic views aimed at mirror, sunshield, truss, and bus task regions
      week1_status: implemented_as_metadata_sampler
    failure_focused:
      description: deterministic views near glare, occlusion, low-light, and thin-structure stress cases
      week1_status: implemented_as_metadata_sampler
guardrails:
  metadata_completeness_required: 1.0
  sample_media_completeness_required: 1.0
  week3_episode_frame_count_required: 100
  week3_episode_metadata_completeness_required: 1.0
  week4_randomized_pilot_frame_count_required: 600
  week4_randomized_train_frame_count_required: 500
  week4_clean_validation_frame_count_required: 100
  week4_randomization_metadata_completeness_required: 1.0
  week4_duplicate_view_rate_max: 0.05
  week4_validation_all_scene_labels_required: true
  week4_config_version_required_in_metadata: true
  week4_bounded_randomization_ranges_required: true
  week5_anomaly_pilot_frame_count_required: 720
  week5_anomaly_train_frame_count_required: 480
  week5_anomaly_validation_frame_count_required: 120
  week5_anomaly_dev_test_frame_count_required: 120
  week5_anomaly_metadata_completeness_required: 1.0
  week5_anomaly_counterpart_coverage_required: 1.0
  week5_train_true_anomaly_fraction_max: 0.50
  week5_eval_true_anomaly_fraction_max: 0.34
  week5_high_glare_control_count_min: 80
  week5_high_glare_false_alarm_rate_max: 0.25
  week6_beta_frame_count_required: 720
  week6_beta_train_frame_count_required: 480
  week6_beta_validation_frame_count_required: 120
  week6_beta_dev_test_frame_count_required: 120
  week6_beta_dev_test_rasterized_frame_count_required: 60
  week6_beta_dev_test_path_traced_frame_count_required: 60
  week6_beta_scene_tag_required: scene-beta-v0.2.0
  week6_beta_dataset_tag_required: week6-beta-data-v0.2.0
  week6_path_traced_gpu_metadata_completeness_required: 1.0
  week6_path_traced_synced_artifact_fraction_required: 1.0
  week6_train_true_anomaly_fraction_max: 0.50
  week6_eval_true_anomaly_fraction_max: 0.34
  week6_high_glare_control_count_min: 80
  week6_high_glare_false_alarm_rate_max: 0.25
  week6_dev_test_renderer_pair_count_required: 60
  week3_rollout_join_key:
    - episode_id
    - frame_index
  max_corrupt_or_blank_frame_fraction: 0.05
  unknown_label_ids: prohibited
  semantic_mask_unknown_label_ids: prohibited
  public_reference_images_in_training: prohibited
  train_validation_test_episode_leakage: prohibited_unless_paired_renderer_comparison
  static_and_episode_frames_must_be_distinguished_by_generation_mode: true
  randomized_frames_must_be_distinguished_by_generation_mode: true
  renderer_metrics_must_be_separate: true
  anomaly_false_alarm_reporting_required_for_high_glare: true
  clean_validation_subset_must_remain_unrandomized: true
  anomaly_counterpart_condition_required: true
  anomaly_prevalence_reporting_required: true
  week6_path_traced_dev_subset_requires_real_gpu_artifacts: true
  week6_official_gpu_run_requires_registry_metadata: true
reference_image_policy:
  official_training_use: prohibited
  validation_use: allowed_with_manifest
  heldout_tuning_use: prohibited
validation:
  local_commands:
    - python scripts/validate_contracts.py
    - python scripts/generate_dummy_dataset.py
    - python scripts/validate_dataset.py
    - python scripts/generate_week3_dataset.py
    - python scripts/validate_week3_dataset.py
    - python scripts/create_week3_contact_sheet.py
    - python scripts/generate_week4_pilot_dataset.py
    - python scripts/validate_week4_dataset.py
    - python scripts/create_week4_contact_sheet.py
    - python scripts/generate_week5_anomaly_dataset.py
    - python scripts/validate_week5_anomaly_dataset.py
    - python scripts/create_week5_contact_sheet.py
    - python scripts/evaluate_week5_perception_baseline.py
    - python scripts/generate_week6_beta_dataset.py
    - python scripts/validate_week6_beta_dataset.py
    - python scripts/create_week6_contact_sheet.py
    - python scripts/evaluate_week6_perception_baseline.py
    - python scripts/e2e_local_smoke.py
    - pytest
downstream_handoff:
  consumes_from_workstream1:
    - labels
    - task_regions
    - camera_rgb
    - camera_depth
    - materials.variants
    - lighting.variants
  provides_to_workstream3:
    - frame metadata
    - camera poses
    - renderer mode
    - material variant
    - anomaly state
    - target region
