version: 0.2.0
status: frozen_week6_contract_0_2
contract_freeze:
  gate: gate2_contract_freeze_0_2
  date: 2026-06-27
  owner: team1_scene_qa_integration_lead
  downstream_adaptation_window_hours: 48
  breaking_change_policy: integration_council_approval_required
  reference_set_change_policy: integration_council_approval_required
units:
  meters_per_unit: 1.0
frames:
  world: /World
  target: /World/JWST
  inspector: /World/Inspector
  tasks: /World/Tasks
  safety: /World/Safety
  camera_rgb: /World/Inspector/Sensors/RGBCamera
  camera_depth: /World/Inspector/Sensors/DepthCamera
  imu: /World/Inspector/Sensors/IMUFrame
scene_files:
  root: usd/jwst_inspect_root.usd
  layers:
    geometry: usd/layers/geometry.usd
    materials: usd/layers/materials.usd
    semantics: usd/layers/semantics.usd
    sensors: usd/layers/sensors.usd
    safety_zones: usd/layers/safety_zones.usd
    tasks: usd/layers/tasks.usd
    lighting_variants: usd/layers/lighting_variants.usd
asset_strategy:
  selected_external_geometry_asset: jwst_nasa_glb_2025
  current_scene_source: proxy_fallback_with_source_mapping
  fallback_reason: preserve_stable_contract_paths_until_imported_geometry_is_component_mapped
  component_mapping_manifest: assets/jwst/component_mapping.csv
  large_downloads_tracked_in_git: false
labels:
  0: background
  1: jwst_primary_mirror
  2: jwst_secondary_mirror
  3: jwst_sunshield_layer_outer
  4: jwst_sunshield_edge
  5: jwst_bus
  6: jwst_antenna
  7: jwst_truss
  8: inspector_body
  9: inspector_solar_panel
task_regions:
  approach_hold_standoff:
    region_id: approach_hold_standoff_v0
    target_prims:
      - /World/JWST
    nominal_standoff_m: 35.0
    valid_standoff_band_m:
      min: 25.0
      max: 45.0
  mirror_inspection:
    region_id: mirror_inspection_v0
    target_prims:
      - /World/JWST/Optics/PrimaryMirror
      - /World/JWST/Optics/SecondaryMirror
    nominal_standoff_m: 30.0
    coverage_cell_count: 16
    required_label_ids:
      - 1
      - 2
  sunshield_survey:
    region_id: sunshield_survey_v0
    target_prims:
      - /World/JWST/Sunshield
    nominal_standoff_m: 45.0
    coverage_cell_count: 24
    required_label_ids:
      - 3
      - 4
safety:
  keepout_volume: /World/Safety/Keepout
  standoff_shell: /World/Safety/StandoffShell
  approach_corridor: /World/Safety/ApproachCorridor
  collision_proxies:
    - /World/Safety/CollisionProxies/JWSTBusProxy
    - /World/Safety/CollisionProxies/SunshieldProxy
  guardrails:
    collision_proxy_changes_after_week6: requires_integration_approval
    keepout_shrink_after_policy_training: prohibited_without_bug_record
    unsafe_coverage_counts_for_score: false
semantic_guardrails:
  duplicate_label_ids_allowed: false
  unknown_label_ids_allowed: false
  required_task_region_label_coverage_min: 0.90
  current_proxy_task_region_label_coverage: 1.00
  label_ids_frozen_until: integration_council_approval
task_guardrails:
  coverage_cell_resize_after_policy_training: prohibited_without_bug_record
  coverage_cell_removal_after_week2: requires_contract_changelog
  task_region_id_renames_after_week2: prohibited_without_integration_review
materials:
  variant_catalog: configs/materials/material_variants.yaml
  variants:
    nominal:
      description: baseline proxy materials for contract and downstream tests
    high_glare:
      description: mirror and sunshield reflectance stress case
    degraded:
      description: darkened or weathered thermal blanket stress case
    anomaly_test:
      description: localized anomaly surfaces for later data and policy tests
  guardrails:
    high_glare_and_degraded_required_even_if_performance_drops: true
    tune_to_make_perception_easy: false
    tune_to_heldout_reference_images: false
lighting:
  variant_catalog: configs/lighting/lighting_variants.yaml
  variants:
    - nominal_sun_key
    - high_glare_edge
    - low_light_cold_side
    - mixed_stress
validation:
  local_commands:
    - python scripts/validate_contracts.py
    - python scripts/validate_scene.py
    - python scripts/validate_reference_manifest.py
    - python scripts/validate_run_registry.py
    - python scripts/validate_dataset.py
    - python scripts/validate_week5_anomaly_dataset.py
    - python scripts/validate_evaluation_contract.py --config configs/experiments/dev_evaluation_suite_v0_2.yaml
    - python scripts/e2e_local_smoke.py
scene_beta:
  scene_tag: scene-beta-v0.2.0
  compatibility_aliases:
    - scene-proxy-thin-slice-v0.1
  qa_inventory: validation/scene_beta/week6_qa_inventory.yaml
  qa_report: validation/reports/week6_scene_beta_qa_report.md
  reference_freeze: validation/reference_sets/week6_reference_freeze.yaml
  beta_render_config: configs/renderers/week6_beta_validation.yaml
  vast_sync_plan: compute/week6_scene_beta_sync_plan.md
  post_freeze_guardrails:
    breaking_scene_contract_changes_require_integration_council: true
    reference_set_changes_require_integration_council: true
    label_task_safety_path_renames_allowed: false
scene_release_candidate:
  scene_rc_tag: scene-rc-v0.2.1
  base_scene_tag: scene-beta-v0.2.0
  compatibility_aliases:
    - scene-beta-v0.2.0
    - scene-proxy-thin-slice-v0.1
  downstream_triage: validation/downstream/week7_downstream_triage.yaml
  release_candidate_manifest: validation/scene_rc/week7_release_candidate.yaml
  performance_profile: validation/scene_rc/week7_performance_profile.yaml
  hardening_report: validation/reports/week7_downstream_hardening_report.md
  final_task_region_draft_status: rc_locked_no_id_changes
  final_safety_zone_draft_status: rc_locked_no_path_or_boundary_shrink
  downstream_validation_commands:
    - python scripts/validate_week5_anomaly_dataset.py
    - python scripts/validate_evaluation_contract.py --config configs/experiments/dev_evaluation_suite_v0_2.yaml
    - python scripts/run_dev_evaluation_suite.py --config configs/experiments/dev_evaluation_suite_v0_2.yaml --output-dir runs/dev_evaluation_suite
    - python scripts/e2e_local_smoke.py
  guardrails:
    no_contract_breaking_changes: true
    unresolved_blocking_downstream_issues_allowed: false
    label_task_safety_path_renames_allowed: false
    safety_boundary_shrink_allowed: false
    coverage_patch_rename_or_resize_allowed: false
    completed_profile_rows_require_run_registry_metadata: true
    public_reference_training_use_allowed: false
    heldout_reference_tuning_allowed: false
thin_slice:
  scene_tag: scene-proxy-thin-slice-v0.1
  fixed_seed: 31003
  renderer_config: configs/renderers/thin_slice_validation.yaml
  render_manifest: validation/render_manifest.csv
  required_camera_ids:
    - mirror_inspection_fixed
    - sunshield_survey_fixed
    - approach_standoff_overview
  required_task_aliases:
    approach_hold_standoff_episode: approach_hold_standoff_v0
    mirror_inspection_episode: mirror_inspection_v0
    sunshield_survey_episode: sunshield_survey_v0
  required_renderer_modes:
    - rasterized
    - path_traced
  vast_smoke:
    status: blocked_vast_required
    blocker: No x090 Vast.ai instance has been allocated for this local Week 3 package.
    required_before_official_gate_credit: true
coverage_surfaces:
  surface_map: configs/coverage/coverage_surfaces.yaml
  task_region_maps:
    mirror_inspection_v0:
      expected_coverage_patches: 16
      required_patch_prefix: mirror_cell_
      allowed_label_ids:
        - 1
        - 2
    sunshield_survey_v0:
      expected_coverage_patches: 24
      required_patch_prefix: sunshield_cell_
      allowed_label_ids:
        - 3
        - 4
  guardrails:
    coverage_patch_duplicates_allowed: false
    coverage_cells_without_label_mapping_allowed: false
    excluded_cells_without_reason_allowed: false
    coverage_patch_names_match_rollout_logs: true
sparse_annotations:
  sparse_keypoint_template: validation/annotations/sparse_keypoints/week4_keypoints_template.csv
  silhouette_mask_guidance: validation/annotations/silhouette_masks/README.md
  candidate_min: 10
  candidate_target: 20
  guardrails:
    public_reference_training_use_allowed: false
    candidate_reference_manifest_required: true
    annotation_artifact_large_file_git_tracking_allowed: false
week5_stressors:
  renderer_stress_config: configs/renderers/week5_material_stress.yaml
  anomaly_regions: configs/anomalies/week5_anomaly_regions.yaml
  sensor_frame_config: configs/sensors/inspector_sensor_frames.yaml
  collision_proxy_report: validation/reports/week5_collision_proxy_report.md
  material_stress_report: validation/reports/week5_material_stress_report.md
  required_material_variants:
    - nominal
    - high_glare
    - degraded
    - anomaly_test
  required_lighting_variants:
    - nominal_sun_key
    - high_glare_edge
    - low_light_cold_side
    - mixed_stress
  guardrails:
    anomaly_real_jwst_failure_claims_allowed: false
    material_or_lighting_tuning_to_perception_allowed: false
    material_or_lighting_tuning_to_heldout_references_allowed: false
    collision_proxy_shrinkage_allowed: false
    sensor_path_renames_after_week2: prohibited_without_integration_review
week6_reference_freeze:
  frozen_reference_set: validation/reference_sets/week6_reference_freeze.yaml
  frozen_dev_reference_min: 5
  frozen_heldout_reference_count: 5
  guardrails:
    public_reference_training_use_allowed: false
    heldout_reference_tuning_allowed: false
    post_freeze_reference_changes_require_integration_council: true
ship_gate:
  week2_contract_freeze_0_1:
    required:
      - scene_contract_status_frozen
      - selected_external_geometry_asset_recorded
      - proxy_fallback_component_mapping_recorded
      - semantic_label_coverage_at_or_above_guardrail
      - safety_and_task_regions_machine_readable
      - all_local_validators_pass
  week3_thin_vertical_slice_support:
    required:
      - scene_proxy_thin_slice_tag_declared
      - fixed_seed_declared
      - task_aliases_map_to_frozen_region_ids
      - render_manifest_has_paired_raster_and_path_traced_rows
      - vast_smoke_result_or_blocker_recorded
      - external_reference_checklist_exists
      - no_large_or_generated_assets_committed
  week4_validation_renders_and_coverage:
    required:
      - coverage_surface_map_exists
      - coverage_surface_map_matches_frozen_task_region_ids
      - duplicate_coverage_patch_ids_equal_zero
      - coverage_cells_without_label_mapping_equal_zero
      - excluded_cells_without_reason_equal_zero
      - render_manifest_has_week4_paired_raster_and_path_traced_rows
      - render_rows_do_not_claim_completion_without_artifacts
      - sparse_keypoint_template_has_at_least_ten_training_excluded_candidates
      - public_reference_rows_allowed_for_training_equal_zero
      - all_local_validators_pass
  week5_material_lighting_anomaly_safety_sensor_gate:
    required:
      - material_variant_catalog_0_1_released
      - lighting_variant_catalog_0_1_released
      - all_material_and_lighting_variants_selectable_by_config
      - week5_stress_render_matrix_has_24_rows
      - render_rows_do_not_claim_completion_without_artifacts
      - team2_has_at_least_two_variant_combos
      - team3_has_high_glare_evaluation_combo
      - anomaly_regions_tied_to_known_task_regions
      - anomaly_real_failure_claims_equal_zero
      - collision_proxy_report_documents_all_existing_proxies
      - collision_proxy_shrinkage_equal_zero
      - sensor_frame_validation_passes_for_rgb_depth_imu
      - label_task_region_and_coverage_patch_renames_equal_zero
      - public_reference_training_or_tuning_use_equal_zero
      - no_large_or_generated_assets_committed
      - all_local_validators_pass
  week6_scene_contract_0_2_beta_freeze:
    required:
      - scene_contract_version_0_2_0
      - scene_contract_status_frozen_week6_contract_0_2
      - beta_scene_tag_declared
      - required_prim_path_validation_32_of_32
      - required_label_validation_10_of_10
      - required_safety_and_task_region_validation_complete
      - asset_provenance_completeness_at_or_above_90_percent
      - dev_and_heldout_reference_sets_frozen
      - week6_beta_render_manifest_has_24_rows
      - render_rows_do_not_claim_completion_without_artifacts
      - downstream_local_smoke_failures_equal_zero
      - post_freeze_change_policies_declared
      - no_large_or_generated_assets_committed
      - all_local_validators_pass
  week7_downstream_hardening_scene_rc:
    required:
      - scene_rc_tag_scene_rc_v0_2_1_declared
      - compatibility_aliases_preserve_week6_beta_and_week3_thin_slice_tags
      - downstream_triage_has_zero_unresolved_blocking_issues
      - team2_week5_anomaly_validation_passes
      - team3_week6_dev_evaluation_suite_passes
      - label_coverage_at_or_above_95_percent
      - label_task_safety_and_coverage_renames_equal_zero
      - safety_boundary_shrink_count_equal_zero
      - performance_profile_records_standard_views_or_blockers
      - completed_profile_rows_without_registry_metadata_equal_zero
      - public_reference_training_and_heldout_tuning_use_equal_zero
      - no_large_or_generated_assets_committed
      - all_local_validators_pass
downstream_handoff:
  provides_to_workstream2:
    - labels
    - camera_rgb
    - camera_depth
    - materials.variants
    - lighting.variants
    - week5_stressors
    - anomaly_regions
  provides_to_workstream3:
    - frames
    - safety
    - task_regions
    - coverage_surfaces
    - week5_stressors
    - sensor_frame_config
    - collision_proxies
