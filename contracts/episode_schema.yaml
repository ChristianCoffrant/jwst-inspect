version: 0.2.0
owner: team3_autonomous_inspection
status: frozen_week6_evaluation_contract_0_2
contract_freeze:
  week: 6
  freeze_date: 2026-06-27
  gate: evaluation_contract_0_2
  change_policy: metric_or_task_scope_changes_require_integration_council_approval_and_ablation
episode_fields:
  - episode_id
  - seed
  - task_name
  - initial_state
  - target_region
  - renderer_mode
  - nuisance_condition
  - material_variant
  - lighting_condition
  - sensor_noise_profile
  - latency_profile
  - actuation_delay_profile
  - policy_id
  - coverage_cell_count
  - success_criteria
official_task_list:
  dev_suite_v0_2:
    - approach_hold_standoff
    - sunshield_survey
  planned_week7:
    - mirror_inspection
    - anomaly_reacquisition
tasks:
  approach_hold_standoff:
    required_week: 1
    target_region: approach_hold_standoff_v0
    primary_goal: approach to the inspection shell and hold safe relative pose
    required_metrics:
      - task_success
      - standoff_error_mean
      - standoff_error_max
      - relative_velocity_at_hold_mps
      - keepout_violation_rate
      - abort_rate
  sunshield_survey:
    required_week: 4
    target_region: sunshield_survey_v0
    primary_goal: survey sunshield coverage cells while respecting standoff
  mirror_inspection:
    required_week: 7
    target_region: mirror_inspection_v0
    primary_goal: inspect mirror regions under glare and viewpoint constraints
  anomaly_reacquisition:
    required_week: 7
    target_region: pending_team1_team2_contract
    primary_goal: reacquire a flagged anomaly region if provided by data pipeline
baseline_policy_list:
  official_dev_suite:
    - scripted_baseline
    - learned_state_bc_v0_1
  exploratory_only:
    - manual_debug_policy
held_out_seed_policy:
  final_test_owner: integration_council
  dev_suite_seed_visibility: allowed
  final_seed_visibility_before_freeze: prohibited
  final_seed_tuning_allowed: false
profile_hooks:
  sensor_noise_profile:
    default: none
    allowed:
      - none
      - low_noise_proxy
  latency_profile:
    default: none
    allowed:
      - none
      - fixed_latency_proxy
  actuation_delay_profile:
    default: none
    allowed:
      - none
      - fixed_actuation_delay_proxy
observation_space:
  week1_required_low_dimensional_state:
    - relative_position_m
    - relative_velocity_mps
    - standoff_error_m
    - distance_to_keepout_m
    - target_region_id
    - coverage_patch_id
  optional_later:
    - rgb_image
    - depth_image
    - semantic_mask
    - perception_confidence
action_space:
  week1_required:
    type: desired_velocity_control
    fields:
      - desired_translational_velocity_mps
      - look_at_target
      - abort
termination:
  collision: true
  keepout_violation: true
  max_steps: true
  abort_command: true
safety_rules:
  inherited_from_scene_contract:
    - safety.keepout_volume
    - safety.standoff_shell
    - safety.collision_proxies
  unsafe_coverage_counts_for_score: false
  abort_episodes_count_in_summary: true
local_vs_vast:
  local:
    - schema validation
    - toy rollout JSON scoring
    - metric unit tests
    - R2P placeholder report generation
  vast_ai_x090_required:
    - Isaac Sim scene load
    - Isaac Lab rollout in official scene
    - RTX rasterized render validation
    - path-traced evaluation
official_run_metadata:
  required_fields:
    - run_id
    - owner
    - team
    - git_commit
    - episode_schema_version
    - metrics_schema_version
    - config_hash
    - policy_id
    - baseline_policy_id
    - episode_id
    - renderer_mode
    - sensor_noise_profile
    - latency_profile
    - actuation_delay_profile
    - artifact_sync_status
    - status
